[versions]
pluginPublish = "2.0.0"
spotless = "8.2.1"
dependencyCheck = "12.2.0"
nexusPublish = "2.0.0"
junit = "6.1.0-M1"
lombok = "1.18.42"

[libraries]
junit-api = { group = "org.junit.jupiter", name = "junit-jupiter-api", version.ref = "junit" }
